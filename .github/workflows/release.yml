name: Release

permissions:
    contents: write

on:
    push:
        tags:
            - v[0-9]+.*

jobs:
    create-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: taiki-e/create-gh-release-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

    upload-assets:
        needs: create-release
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: mipsel-unknown-linux-gnu
                      os: ubuntu-latest
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v6

            - name: Install nightly + rust-src (mipsel)
              if: matrix.target == 'mipsel-unknown-linux-gnu'
              uses: dtolnay/rust-toolchain@nightly
              with:
                  components: rust-src

            - name: Install cross (mipsel)
              if: matrix.target == 'mipsel-unknown-linux-gnu'
              run: cargo install cross --locked

            - name: Build (mipsel, build-std)
              if: matrix.target == 'mipsel-unknown-linux-gnu'
              env:
                  ring_core_no_asm: 1
                  AWS_LC_SYS_NO_ASM: 1
                  RUSTFLAGS: "-C target-feature=+crt-static"
              run: cross +nightly build --release --bin tg-ws-proxy --target mipsel-unknown-linux-gnu -Z build-std=std,panic_abort

            - name: Inspect build output (mipsel)
              if: matrix.target == 'mipsel-unknown-linux-gnu'
              run: |
                  FILE="target/${{ matrix.target }}/release/tg-ws-proxy"
                  ls -lah "target/${{ matrix.target }}/release/" || true
                  test -f "$FILE"

            - name: Upload to GitHub Release (mipsel)
              if: matrix.target == 'mipsel-unknown-linux-gnu'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  set -euxo pipefail
                  TAG="${GITHUB_REF_NAME}"
                  NAME="tg-ws-proxy-${{ matrix.target }}"
                  TMPDIR="$(mktemp -d)"
                  cp "target/${{ matrix.target }}/release/tg-ws-proxy" "${TMPDIR}/tg-ws-proxy"
                  tar -C "${TMPDIR}" -czf "${NAME}.tar.gz" tg-ws-proxy
                  gh release upload "$TAG" "${NAME}.tar.gz" --clobber
