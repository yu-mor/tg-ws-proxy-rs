name: Release

permissions:
    contents: write

on:
    push:
        tags:
            - v[0-9]+.*

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install Rust Toolchain
              run: |
                rustup default nightly
                rustup component add rust-src --toolchain nightly

            - name: Install Zig Compiler
              uses: mlugg/setup-zig@v2
              with:
                version: 0.13.0

            - name: Configure Cargo Linker (Zig CC)
              run: |
                mkdir -p .cargo
                cat << 'EOF' > .cargo/config.toml
                [target.mipsel-unknown-linux-musl]
                linker = "zig-cc-linker"
                rustflags = [
                  "-C", "target-feature=+crt-static",
                  "-C", "link-arg=-static",
                  "-C", "link-arg=-mno-dsp",
                  "-C", "link-arg=-march=mips32r2"
                ]
                EOF

            - name: Create Custom Zig Linker Wrapper
              run: |
                echo '#!/bin/sh' > zig-cc-linker
                echo 'zig cc -target mipsel-unknown-linux-musl "$@"' >> zig-cc-linker
                chmod +x zig-cc-linker
                echo "$(pwd)" >> $GITHUB_PATH

            - name: Build Binary (Pure Zig + Rust Toolchain)
              env:
                  ring_core_no_asm: 1
                  AWS_LC_SYS_NO_ASM: 1
                  CC_mipsel_unknown_linux_musl: zig cc -target mipsel-unknown-linux-musl
                  CC: zig cc -target mipsel-unknown-linux-musl
                  AR: zig ar
                  RUSTFLAGS: "-C opt-level=z -C panic=abort"
              run: |
                cargo build --bin tg-ws-proxy --target mipsel-unknown-linux-musl -Z build-std=std,panic_abort

            - name: Prepare Assets
              run: |
                NAME="tg-ws-proxy-mipsel-static"
                TMPDIR="$(mktemp -d)"
                cp "target/mipsel-unknown-linux-musl/debug/tg-ws-proxy" "${TMPDIR}/tg-ws-proxy"
                tar -C "${TMPDIR}" -czf "${NAME}.tar.gz" tg-ws-proxy
                echo "ARCHIVE_NAME=${NAME}.tar.gz" >> $GITHUB_ENV

            - name: Create GitHub Release and Upload Asset
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                TAG="${GITHUB_REF_NAME}"
                gh release create "$TAG" --title "Release $TAG" --notes "Automated static build for MIPS (RT5350)" || true
                gh release upload "$TAG" "${{ env.ARCHIVE_NAME }}" --clobber
